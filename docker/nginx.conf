# Serve o SPA e faz proxy das rotas de API para o backend (origem única → sem CORS).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: deixa o React Router resolver as rotas do cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Rotas de API → serviço backend (nome do serviço no docker-compose).
    location ~ ^/(auth|query|admin|documentos|ingest|health)(/|$) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Streaming (/query/stream): não bufferizar a resposta.
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
